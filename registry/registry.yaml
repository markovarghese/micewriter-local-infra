apiVersion: apps/v1
kind: Deployment
metadata:
  name: registry
  namespace: micewriter-infra
spec:
  replicas: 1
  selector:
    matchLabels:
      app: registry
  template:
    metadata:
      labels:
        app: registry
    spec:
      nodeSelector:
        kubernetes.io/hostname: k8s-node-1
      containers:
        - name: registry
          image: registry:2
          ports:
            - containerPort: 5000
          env:
            - name: REGISTRY_STORAGE_DELETE_ENABLED
              value: "true"
          volumeMounts:
            - name: data
              mountPath: /var/lib/registry
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: registry
  namespace: micewriter-infra
spec:
  type: LoadBalancer
  selector:
    app: registry
  ports:
    - name: registry
      port: 5000
      targetPort: 5000
