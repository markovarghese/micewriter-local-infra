apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: micewriter-minio-console
  namespace: micewriter-infra
spec:
  rules:
  - host: k8s-node-1.local
    http:
      paths:
      - path: /minio
        pathType: Prefix
        backend:
          service:
            name: micewriter-minio
            port:
              number: 9001
