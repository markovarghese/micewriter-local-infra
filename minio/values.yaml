# Bitnami MinIO — dev values for k3s (local-path provisioner + LoadBalancer)
mode: standalone

image:
  registry: docker.io
  repository: minio/minio
  tag: latest

global:
  security:
    allowInsecureImages: true

command: ["minio"]
args:
  - "server"
  - "/bitnami/minio/data"
  - "--console-address"
  - ":9001"
console:
  enabled: true
  replicaCount: 0

clientImage:
  registry: docker.io
  repository: minio/mc
  tag: latest

auth:
  rootUser: micewriter
  rootPassword: micewriter123

networkPolicy:
  enabled: false

persistence:
  enabled: true
  storageClass: local-path
  size: 10Gi

service:
  type: LoadBalancer
  extraPorts:
    - name: console
      port: 9001
      targetPort: 9001
      protocol: TCP

ingress:
  enabled: false

consoleIngress:
  enabled: false

# Auto-create the iceberg bucket on first deploy
provisioning:
  enabled: false
  buckets:
    - name: iceberg

# Pin to k8s-node-2 (desktop worker) so MinIO and Nessie sit together,
# isolated from the sandbox+engine on k8s-node-3.
nodeSelector:
  kubernetes.io/hostname: k8s-node-2

# Expose MinIO's built-in Prometheus endpoint so Grafana Alloy scrapes it.
# `/minio/v2/metrics/cluster` is the public no-auth endpoint in modern MinIO.
podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "9000"
  prometheus.io/path: "/minio/v2/metrics/cluster"

# Raised so MinIO is never the bottleneck during burst Parquet uploads from
# the engine sidecar. CPU bump (500m -> 2 cores) is the load-bearing change.
resources:
  requests:
    memory: 1Gi
    cpu: 500m
  limits:
    memory: 2Gi
    cpu: "2"
