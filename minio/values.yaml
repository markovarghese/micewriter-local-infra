# Bitnami MinIO — dev values for k3s (local-path provisioner + LoadBalancer)
mode: standalone

image:
  registry: docker.io
  repository: minio/minio
  tag: latest

global:
  security:
    allowInsecureImages: true

command: ["minio"]
args:
  - "server"
  - "/bitnami/minio/data"
  - "--console-address"
  - ":9001"

console:
  enabled: false

extraEnvVars:
  - name: MINIO_BROWSER
    value: "on"

clientImage:
  registry: docker.io
  repository: minio/mc
  tag: latest

auth:
  rootUser: micewriter
  rootPassword: micewriter123

persistence:
  enabled: true
  storageClass: local-path
  size: 10Gi

service:
  type: LoadBalancer
  extraPorts:
    - name: console
      port: 9001
      targetPort: 9001
      protocol: TCP

ingress:
  enabled: false

consoleIngress:
  enabled: false

# Auto-create the iceberg bucket on first deploy
provisioning:
  enabled: false
  buckets:
    - name: iceberg

resources:
  requests:
    memory: 256Mi
    cpu: 100m
  limits:
    memory: 512Mi
    cpu: 500m
