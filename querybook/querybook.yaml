---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-pvc
  namespace: micewriter-infra
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local-path
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: micewriter-infra
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
      - name: mysql
        image: mysql:8
        env:
        - name: MYSQL_ROOT_PASSWORD
          value: rootpw
        - name: MYSQL_USER
          value: querybook
        - name: MYSQL_PASSWORD
          value: querybook
        - name: MYSQL_DATABASE
          value: querybook
        ports:
        - containerPort: 3306
        resources:
          requests:
            memory: 256Mi
            cpu: 100m
          limits:
            memory: 512Mi
            cpu: 500m
        volumeMounts:
        - name: data
          mountPath: /var/lib/mysql
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: mysql-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: micewriter-infra
spec:
  selector:
    app: mysql
  ports:
  - port: 3306
    targetPort: 3306
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: micewriter-infra
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
        resources:
          requests:
            memory: 64Mi
            cpu: 50m
          limits:
            memory: 128Mi
            cpu: 200m
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: micewriter-infra
spec:
  selector:
    app: redis
  ports:
  - port: 6379
    targetPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: querybook-web
  namespace: micewriter-infra
spec:
  replicas: 1
  selector:
    matchLabels:
      app: querybook-web
  template:
    metadata:
      labels:
        app: querybook-web
    spec:
      initContainers:
      - name: wait-for-mysql
        image: busybox
        command: ['sh', '-c', 'until nc -z mysql 3306; do sleep 2; done']
      containers:
      - name: querybook
        image: pinterest/querybook:latest
        env:
        - name: DATABASE_CONN
          value: mysql+pymysql://querybook:querybook@mysql:3306/querybook
        - name: REDIS_URL
          value: redis://redis:6379/0
        - name: PUBLIC_URL
          value: http://k8s-node-1.local:10001
        - name: FLASK_SECRET_KEY
          value: local-dev-secret
        ports:
        - containerPort: 10001
        resources:
          requests:
            memory: 256Mi
            cpu: 100m
          limits:
            memory: 512Mi
            cpu: 500m
---
apiVersion: v1
kind: Service
metadata:
  name: querybook
  namespace: micewriter-infra
spec:
  type: LoadBalancer
  selector:
    app: querybook-web
  ports:
  - port: 10001
    targetPort: 10001
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: querybook-worker
  namespace: micewriter-infra
spec:
  replicas: 1
  selector:
    matchLabels:
      app: querybook-worker
  template:
    metadata:
      labels:
        app: querybook-worker
    spec:
      initContainers:
      - name: wait-for-mysql
        image: busybox
        command: ['sh', '-c', 'until nc -z mysql 3306; do sleep 2; done']
      containers:
      - name: querybook
        image: pinterest/querybook:latest
        command: ["/bin/sh", "-c", "python querybook/public/querybook_consumer.py"]
        env:
        - name: DATABASE_CONN
          value: mysql+pymysql://querybook:querybook@mysql:3306/querybook
        - name: REDIS_URL
          value: redis://redis:6379/0
        - name: PUBLIC_URL
          value: http://k8s-node-1.local:10001
        - name: FLASK_SECRET_KEY
          value: local-dev-secret
        resources:
          requests:
            memory: 256Mi
            cpu: 100m
          limits:
            memory: 512Mi
            cpu: 500m
